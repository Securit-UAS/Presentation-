<title>Securit Commercial Drone Services | Video</title>

<style>

:root{
--bg1:#0b0c10;
--bg2:#121826;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--securblue:#2e4ea2;
--text:#ffffff;
}

body{
margin:0;
min-height:100vh;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
text-align:center;
background:
radial-gradient(circle at 30% 20%, rgba(46,78,162,0.25), transparent 45%),
radial-gradient(circle at 70% 80%, rgba(46,78,162,0.18), transparent 40%),
linear-gradient(145deg,var(--bg1),var(--bg2));
overflow-x:hidden;
}

/* subtle animated glow */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 40% 30%, rgba(46,78,162,0.35), transparent 50%),
radial-gradient(circle at 70% 70%, rgba(46,78,162,0.25), transparent 50%);
animation:glowMove 18s ease-in-out infinite alternate;
z-index:-1;
}

@keyframes glowMove{
0%{ transform:translateY(-40px); }
100%{ transform:translateY(40px); }
}

.header{
background:#ffffff;
padding:18px 16px;
}

.logo{
max-width:520px;
width:92%;
display:block;
margin:auto;
}

.page-card{
width:min(1040px, calc(100% - 32px));
margin:40px auto;
padding:34px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
box-shadow:0 18px 55px rgba(0,0,0,0.45);
}

/* video */

.video-container{
position:relative;
width:100%;
padding-bottom:56.25%;
border-radius:14px;
overflow:hidden;
background:#000;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

/* compliance badge */

.compliance-badge{
margin-top:20px;
display:inline-flex;
align-items:center;
justify-content:center;
gap:14px;
padding:14px 18px;
border-radius:14px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
flex-wrap:wrap;
}

.compliance-logo{
height:42px;
width:auto;
display:block;
border-radius:6px;
background:#fff;
padding:4px 8px;
}

.compliance-text{
text-align:left;
line-height:1.25;
}

.compliance-title{
font-size:15px;
font-weight:700;
letter-spacing:.2px;
}

.compliance-subtitle{
font-size:12px;
opacity:.75;
margin-top:2px;
}

/* links */

.links{
margin-top:16px;
display:flex;
justify-content:center;
gap:14px;
}

.icon-link{
width:56px;
height:56px;
border-radius:14px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
display:flex;
align-items:center;
justify-content:center;
transition:.2s;
}

.icon-link:hover{
transform:scale(1.08);
background:rgba(255,255,255,0.12);
}

.icon{
width:28px;
}

.note{
margin-top:14px;
font-size:13px;
opacity:.7;
}

</style>
</head>
