<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secur-IT UAS | Video</title>

  <style>
    :root{
      --bg1:#0b0c10;
      --bg2:#141720;
      --card:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.10);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.70);
      --shadow:rgba(0,0,0,0.60);
      --radius:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(145deg,var(--bg1),var(--bg2));
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      text-align:center;
      display:flex;
      flex-direction:column;
    }

    /* Header strip */
    .header{
      background:#ffffff;
      padding:18px 16px;
    }
    .logo{
      max-width:520px;
      width:92%;
      height:auto;
      display:block;
      margin:0 auto;
    }

    /* Glass card */
    .page-card{
      width:min(1000px, calc(100% - 32px));
      margin:42px auto 28px;
      padding:38px 22px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 20px 60px var(--shadow);
    }

    /* Video */
    .video-wrapper{
      position:relative;
      width:100%;
      padding-bottom:56.25%;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 14px 40px rgba(0,0,0,0.55);
    }
    .video-wrapper iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    /* AirData badge */
    .airdata{
      margin-top:26px;
    }
    .airdata img{
      max-width:420px;
      width:92%;
      height:auto;
      border:0;
    }

    /* Icon links */
    .links{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      align-items:center;
    }
    .icon-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:46px;
      height:46px;
      border-radius:12px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      transition:transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      opacity:0.92;
    }
    .icon-link:hover{
      transform:scale(1.07);
      opacity:1;
      background:rgba(255,255,255,0.10);
    }
    .icon{
      width:22px;
      height:22px;
      display:block;
    }

    /* Footer note */
    .note{
      margin-top:18px;
      font-size:13px;
      color:var(--muted);
    }

    /* Small screens */
    @media (max-width:520px){
      .page-card{ padding:26px 14px; }
      .icon-link{ width:44px; height:44px; }
    }
  </style>
</head>

<body>

  <div class="header">
    <!-- Upload your logo to the repo and name it logo.png -->
    <img src="logo.png" class="logo" alt="Secur-IT UAS" />
  </div>

  <div class="page-card">

    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/PsdINR0aoV8"
        title="Secur-IT UAS Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="airdata">
      <a href="https://certificates.airdata.com/BmNedR" target="_blank" rel="noopener">
        <img
          alt="Airdata UAV Drone Safety Verified Badge"
          src="https://certificates.airdata.com/badge?i=BmNedR&r=gYp3&t=7&m=3&size=12&c=0">
      </a>
    </div>

    <div class="links">
      <!-- Upload square icons to the repo as website.png and linkedin.png -->
      <a class="icon-link" href="https://secur-it.co.uk" target="_blank" rel="noopener" aria-label="Secur-IT Website">
        <img src="website.png" class="icon" alt="" />
      </a>

      <a class="icon-link" href="https://www.linkedin.com/company/secur-it-group/posts/?feedView=all" target="_blank" rel="noopener" aria-label="Secur-IT LinkedIn">
        <img src="linkedin.png" class="icon" alt="" />
      </a>
    </div>

    <div class="note">
      Secur-IT UAS Division
    </div>

  </div>

</body>
</html>
