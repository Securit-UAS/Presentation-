<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secur-IT UAS | Video</title>

<style>

:root{
--bg1:#0b0c10;
--bg2:#121826;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
--securblue:#2e4ea2;
--text:#ffffff;
}

body{
margin:0;
min-height:100vh;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
text-align:center;
background:
radial-gradient(circle at 30% 20%, rgba(46,78,162,0.25), transparent 45%),
radial-gradient(circle at 70% 80%, rgba(46,78,162,0.18), transparent 40%),
linear-gradient(145deg,var(--bg1),var(--bg2));
overflow-x:hidden;
}

/* subtle animated glow */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 40% 30%, rgba(46,78,162,0.35), transparent 50%),
radial-gradient(circle at 70% 70%, rgba(46,78,162,0.25), transparent 50%);
animation:glowMove 18s ease-in-out infinite alternate;
z-index:-1;
}

@keyframes glowMove{
0%{ transform:translateY(-40px); }
100%{ transform:translateY(40px); }
}

.header{
background:#ffffff;
padding:18px 16px;
}

.logo{
max-width:520px;
width:92%;
display:block;
margin:auto;
}

.page-card{
width:min(1040px, calc(100% - 32px));
margin:40px auto;
padding:34px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
box-shadow:0 18px 55px rgba(0,0,0,0.45);
}

/* video */

.video-container{
position:relative;
width:100%;
padding-bottom:56.25%;
border-radius:14px;
overflow:hidden;
background:#000;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

/* airdata */

.airdata{
margin-top:20px;
}

.airdata img{
width:280px;
max-width:90%;
}

/* links */

.links{
margin-top:16px;
display:flex;
justify-content:center;
gap:14px;
}

.icon-link{
width:56px;
height:56px;
border-radius:14px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
display:flex;
align-items:center;
justify-content:center;
transition:.2s;
}

.icon-link:hover{
transform:scale(1.08);
background:rgba(255,255,255,0.12);
}

.icon{
width:28px;
}

.note{
margin-top:14px;
font-size:13px;
opacity:.7;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.jpg" class="logo">
</div>

<div class="page-card">

<div class="video-container">

<iframe
src="https://www.youtube.com/embed/k690PaxxyZ0?rel=0&modestbranding=1"
title="Secur-IT UAS Demo"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

<div class="airdata">
<a href="https://certificates.airdata.com/BmNedR" target="_blank">
<img src="https://certificates.airdata.com/badge?i=BmNedR&r=xHhd&t=7&m=3&size=12&c=1">
</a>
</div>

<div class="links">

<a class="icon-link" href="https://secur-it.co.uk" target="_blank">
<img src="website.png" class="icon">
</a>

<a class="icon-link" href="https://www.linkedin.com/company/secur-it-group/posts/?feedView=all" target="_blank">
<img src="linkedin.png" class="icon">
</a>

</div>

<div class="note">
Secur-IT Drone Services
</div>

</div>

</body>
</html>
